[engine]
name = "Honknet Engine"
version = "0.1.0-rc.1"
protocol_version = 1
tick_rate = 30

[network]
listen = "127.0.0.1:3015"
max_message_bytes = 262144
handshake_timeout_ms = 10000
client_timeout_ms = 15000
snapshot_rate = 15
pvs_radius = 32.0

[content]
prototype_roots = ["game/example-module/content/prototypes"]
map_roots = ["game/example-module/maps"]
startup_map = "game/example-module/maps/debug-map.yml"
resource_roots = ["game/example-module/resources"]
localization_roots = ["game/example-module/localization"]

[scripting]
enabled = true
command = "node"
args = ["apps/script-host/dist/main.js"]
module = "game/example-module/server/dist/index.js"
max_tick_ms = 12

[persistence]
enabled = true
root = "data/saves"
autosave_seconds = 300
