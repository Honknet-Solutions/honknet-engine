name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@1.85.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: npm ci --no-audit --no-fund
      - run: npm run validate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: cargo generate-lockfile
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - run: cargo build --workspace --release --locked

  server:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
            binary: honknet-server
          - os: windows-latest
            artifact: windows-x64
            binary: honknet-server.exe
          - os: macos-latest
            artifact: macos-x64
            binary: honknet-server
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo generate-lockfile
      - run: cargo build -p honknet-server --release --locked
      - shell: bash
        run: |
          mkdir -p release
          cp "target/release/${{ matrix.binary }}" release/
          cp engine.toml README.md SECURITY.md LICENSE NOTICE release/
      - uses: actions/upload-artifact@v4
        with:
          name: honknet-server-${{ matrix.artifact }}
          path: release/

  sdk:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@1.85.1
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: cargo generate-lockfile
      - run: npm run package:engine
      - uses: actions/upload-artifact@v4
        with:
          name: honknet-engine-sdk
          path: release/*.tar.gz

  container:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  publish:
    runs-on: ubuntu-latest
    needs: [server, sdk, container]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - shell: bash
        run: |
          find artifacts -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
            SHA256SUMS
