name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo generate-lockfile
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - run: cargo build --workspace --release --locked
      - name: Core scale benchmark smoke test
        if: runner.os == 'Linux'
        env:
          HONKNET_BENCH_ENTITIES: 25000
          HONKNET_BENCH_ITERATIONS: 30
        run: cargo run -p honknet-benchmarks --release --locked

  web:
    name: Web / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run validate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: node packages/cli/dist/index.js version

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [rust, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: honknet-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
