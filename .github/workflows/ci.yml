name: CI
on: [push, pull_request]
jobs:
  rust:
    strategy: {matrix: {os: [ubuntu-latest, windows-latest, macos-latest]}}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with: {components: rustfmt, clippy}
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo build --workspace --release
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with: {targets: wasm32-unknown-unknown}
      - uses: Swatinem/rust-cache@v2
      - run: cargo install wasm-bindgen-cli --version 0.2.126
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm}
      - run: npm install
      - run: npm run typecheck
      - run: npm run build:game-scripts
      - run: git diff --exit-code -- game/scripts/dist/game.js
      - run: npm run build:studio
      - run: npm run build:web
