services:
  honknet-server:
    build:
      context: .
    image: honknet/honknet-engine:0.2.0-rc.1
    restart: unless-stopped
    init: true
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      HONKNET_AUTH_REQUIRED: ${HONKNET_AUTH_REQUIRED:-true}
      HONKNET_AUTH_SECRET: ${HONKNET_AUTH_SECRET:-}
    ports:
      - "3015:3015"
      - "127.0.0.1:3016:3016"
    volumes:
      - honknet-saves:/opt/honknet/data/saves
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3016/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  honknet-saves:
