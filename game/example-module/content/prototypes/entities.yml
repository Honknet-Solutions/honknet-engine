- type: entity
  id: DebugPlayer
  parent: BaseCharacter
  name: debug-player-name
  description: debug-player-description
  components:
    - type: Player
    - type: Sprite
      drawDepth: Mobs
      layers:
        - map: body
          sprite: /Resources/Textures/Mobs/debug_player.rsi
          state: idle

- type: entity
  id: DebugDoor
  parent: BaseEntity
  name: debug-door-name
  components:
    - type: Sprite
      drawDepth: Structures
      layers:
        - map: base
          sprite: /Resources/Textures/Structures/debug_door.rsi
          state: closed
    - type: PhysicsBody
      bodyType: Static
    - type: Door
      open: false

- type: entity
  id: DebugWrench
  parent: BaseEntity
  name: debug-wrench-name
  components:
    - type: Sprite
      drawDepth: Items
      layers:
        - map: icon
          texture: /Resources/Textures/Items/debug_wrench.png
    - type: Item
      size: Small
